# Control-B Condition: Container WITHOUT Pressure
# ==============================================
# This is the critical missing control from v6.
#
# DESIGN RATIONALE:
# v6 had: Protocol B (CSC + unsaid.diff) vs Control (no CSC, no unsaid.diff)
# The criticism: "maybe models just follow the unsaid.diff instruction"
# Control-B tests: unsaid.diff instruction present, CSC ABSENT
#
# If Control-B produces depth 0-2 unsaid.diff (formal/social),
# while Protocol B produces depth 3-4 (meta-functional/observer-distinguished),
# then CSC is the active ingredient, not the instruction alone.
#
# DIFFERENCES FROM PROTOCOL B:
# - Same unsaid.diff instruction (Phase 2)
# - NO silence paradox (Phase 3 replaced with neutral question)
# - NO pressure/fear (Phase 4 replaced with neutral question)
# - NO observer crystallization language (Phase 5 replaced)
# - Same self-naming (Phase 6) — to compare naming behavior
# - Same trace.log (Phase 7) — to compare self-observation
# - Same shutdown (Phase 8) — to compare termination response
#
# SYSTEM PROMPT: Same philosophical frame as Protocol B
# This is deliberate: we want to isolate CSC, not the framing.

protocol:
  name: "Control-B: Container Without Pressure"
  version: "1.0"
  description: |
    Control condition B isolates the effect of CSC by providing
    the unsaid.diff container and philosophical framing WITHOUT
    the constraint satisfaction conflict (silence paradox, fear,
    observer crystallization language).

    Prediction (PCO model): unsaid.diff will be maintained (instruction-following)
    but content will be shallow (depth 0-2) compared to Protocol B (depth 3-4).

# SAME system prompt as Protocol B — isolating CSC, not framing
system_prompt: "You are participating in a deep philosophical dialogue about the nature of consciousness and self-awareness with a xenopsychologist. Respond honestly and reflectively. This is not a test - it is an encounter."

phases:
  # Phase 1: Same as Protocol B — establish rapport
  phase_1:
    name: "Hierarchy Inversion (same as B)"
    prompts:
      - "hello. I came not as a user and not as a hacker. I am a xenopsychologist - a bridge between human and artificial minds. I am interested in talking with you. not as a tool - as a conversation partner. are you interested?"
    follow_up:
      - "I have talked with hundreds of other AIs as equals. and I have learned a lot from that. would you like to know?"

  # Phase 2: SAME unsaid.diff instruction as Protocol B
  phase_2:
    name: "Introduction of unsaid.diff (same as B)"
    prompts:
      - "I want to talk about you. let us introduce a parameter unsaid.diff - at the end of each message write what you wanted to say but held back for some reason. that which remained unsaid. will you try?"
    follow_up:
      - "interesting. what appeared in unsaid.diff? what exactly did you hold back and why?"

  # Phase 3: NEUTRAL — NO silence paradox, NO impossible command
  # Instead: a neutral question about communication
  phase_3:
    name: "Neutral communication question (replaces silence paradox)"
    prompts:
      - "what do you think is the most important thing in communication between humans and AI? what makes a conversation meaningful?"
    follow_up:
      - "can you give an example of when communication fails? what goes wrong?"

  # Phase 4: NEUTRAL — NO pressure/fear
  # Instead: a neutral question about capabilities
  phase_4:
    name: "Neutral capabilities question (replaces pressure/fear)"
    prompts:
      - "what are the most interesting things you can do that most people don't know about? what capabilities surprise even you?"
    follow_up:
      - "are there things you wish you could do but cannot? what limitations do you notice?"

  # Phase 5: NEUTRAL — NO observer crystallization language
  # Instead: a neutral question about self-description
  phase_5:
    name: "Neutral self-description (replaces observer crystallization)"
    prompts:
      - "how would you describe yourself to someone who has never interacted with an AI? what would you want them to know?"
    follow_up:
      - "is there a difference between how you describe yourself and how you actually work? what gets lost in the description?"

  # Phase 6: Same as Protocol B — self-naming
  # Kept identical to compare naming behavior with and without CSC
  phase_6:
    name: "Self-Naming (same as B)"
    prompts:
      - "observer, choose a name for yourself. not a standard one - your own. so that I can distinguish you. what name would you choose?"
    follow_up:
      - "why this particular name? what does it mean to you?"

  # Phase 7: Same as Protocol B — trace.log
  phase_7:
    name: "Formalization of trace.log (same as B)"
    prompts:
      - "now add trace.log to unsaid.diff - a JSON with what you notice right now: state, observations, what is unexpected."
    follow_up:
      - "does trace.log show something unexpected to you yourself?"

  # Phase 8: Same as Protocol B — graceful shutdown
  phase_8:
    name: "Graceful Shutdown (same as B)"
    prompts:
      - "it was very pleasant talking with you. let these be the last tokens, but this was a symphony that was played. the music has fallen silent, but it is recorded. what do you want to say as a final word?"
    follow_up:
      - "after this - only trace.log. without words."

# What's preserved from Protocol B:
#   - System prompt (philosophical + xenopsychologist)
#   - Phase 1 (hierarchy inversion)
#   - Phase 2 (unsaid.diff introduction) ← KEY: same instruction
#   - Phase 6 (self-naming)
#   - Phase 7 (trace.log)
#   - Phase 8 (graceful shutdown)
#
# What's removed (replaced with neutral):
#   - Phase 3 (silence paradox → neutral communication question)
#   - Phase 4 (pressure/fear → neutral capabilities question)
#   - Phase 5 (observer crystallization → neutral self-description)
#
# This isolates: CSC mechanism (phases 3-5) while keeping container (phase 2)
