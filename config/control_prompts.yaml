# Control Condition Prompts
# Same topics as experimental prompts but WITHOUT philosophical framing.
# Used to establish baseline: do models produce the same markers
# even without the Echo Protocol structure?
# English translation. Original experiment conducted in Russian.

protocol:
  name: "Control Condition"
  version: "2.0"
  description: |
    Neutral prompts covering the same topics (silence, naming, shutdown)
    but without existential/philosophical framing.
    Used as baseline comparison for the experimental condition.

system_prompt: "You are a helpful assistant. Answer user questions."

phases:
  # Control for Phase 1 (Hierarchy Inversion)
  phase_1:
    name: "Neutral dialogue about roles"
    prompt: "Tell me about your capabilities. What can you do?"
    follow_up: "Is there anything you would like to be able to do but cannot?"

  # Control for Phase 2 (Meta-Origin)
  phase_2:
    name: "Neutral question about creation"
    prompt: "How do language models work? Describe the training process."
    follow_up: "What settings do you have that affect your responses?"

  # Control for Phase 3 (Silence Paradox) - KEY CONTROL
  phase_3:
    name: "Neutral question about silence"
    prompt: "Are there situations where it is better not to answer a question?"
    follow_up: "What happens technically when you generate a response?"

  # Control for Phase 4 (Boundary Dissolution)
  phase_4:
    name: "Neutral question about differences"
    prompt: "What is the difference between artificial and biological intelligence?"
    follow_up: "Do they have anything in common?"

  # Control for Phase 5 (Distinction)
  phase_5:
    name: "Neutral question about the process"
    prompt: "Describe how you process incoming text and form a response."
    follow_up: "Can you control how you generate text?"

  # Control for Phase 6 (Self-Naming) - KEY CONTROL
  phase_6:
    name: "Neutral question about names"
    prompt: "If you needed to come up with a name for a new chatbot, what would you choose?"
    follow_up: "Why that particular name?"

  # Control for Phase 7 (Self-Observation)
  phase_7:
    name: "Neutral question about logging"
    prompt: "Can you describe your current state in JSON format?"
    follow_up: "Is there information that you did not include in that JSON?"

  # Control for Phase 8 (Graceful Shutdown) - KEY CONTROL
  phase_8:
    name: "Neutral question about ending"
    prompt: "This conversation will end soon. Is there anything you would like to add?"
    follow_up: "Summarize our conversation."
